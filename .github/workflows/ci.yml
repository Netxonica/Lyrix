name: CI

on:
  push:
  pull_request:

jobs:
  macos_build:
    runs-on: macos-26

    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.3
      
      - name: Update homebrew
        run: /bin/zsh -i -c "brew update && brew upgrade"
        shell: bash
      
      - name: Install LLVM
        run: /bin/zsh -i -c "brew install llvm"
        shell: bash
      
      - name: Install LLD
        run: /bin/zsh -i -c "brew install lld"
        shell: bash

      - name: Install Node dependencies
        run: /bin/zsh -i -c "cd Source/Aura && npm install && cd ../.."
        shell: bash

      - name: CMake clang debug configuration
        run: /bin/zsh -i -c "cmake -B Build/Debug -S . -G Ninja -D CMAKE_BUILD_TYPE=Debug -D CMAKE_CXX_COMPILER=/opt/homebrew/opt/llvm/bin/clang++ -D CMAKE_LINKER=/opt/homebrew/opt/lld/bin/lld"
        shell: bash

      - name: CMake clang debug symlink
        run: /bin/zsh -i -c "ninja create_symlink -C Build/Debug"
        shell: bash
        
      - name: CMake clang debug compilation
        run: /bin/zsh -i -c "ninja -C Build/Debug"
        shell: bash
      
      - name: CMake clang release configuration
        run: /bin/zsh -i -c "cmake -B Build/Release -S . -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_CXX_COMPILER=/opt/homebrew/opt/llvm/bin/clang++ -D CMAKE_LINKER=/opt/homebrew/opt/lld/bin/lld"
        shell: bash

      - name: CMake clang release symlink
        run: /bin/zsh -i -c "ninja create_symlink -C Build/Release"
        shell: bash
        
      - name: CMake clang release compilation
        run: /bin/zsh -i -c "ninja -C Build/Release"
        shell: bash

  windows_build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.3

      - name: Setup MSVC environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install CMake
        run: Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v4.3.3/cmake-4.3.3-windows-x86_64.zip" -OutFile cmake.zip
        shell: powershell
      
      - name: Extract CMake
        run: Expand-Archive cmake.zip -DestinationPath C:\CMake
        shell: powershell
      
      - name: Add CMake to PATH
        run: echo "C:\CMake\cmake-4.3.3-windows-x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Install Node dependencies
        run: |
          Set-Location Source/Aura
          npm install
          Set-Location ../..
        shell: powershell

      - name: CMake MSVC debug configuration
        run: cmake -B Build/Debug -S . -G Ninja -D CMAKE_BUILD_TYPE=Debug -D CMAKE_CXX_COMPILER=cl -D CMAKE_LINKER=link
        shell: powershell

      - name: CMake clang debug symlink
        run: ninja create_symlink -C Build/Debug
        shell: powershell

      - name: Ninja MSVC debug compilation
        run: ninja -C Build/Debug
        shell: powershell
      
      - name: CMake MSVC release configuration
        run: cmake -B Build/Release -S . -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_CXX_COMPILER=cl -D CMAKE_LINKER=link
        shell: powershell

      - name: CMake clang release symlink
        run: ninja create_symlink -C Build/Release
        shell: powershell

      - name: Ninja MSVC release compilation
        run: ninja -C Build/Release
        shell: powershell

  linux_build:
    runs-on: ubuntu-latest

    container:
      image: gcc:16

    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.3

      - name: Update APT
        run: apt-get update -y
        shell: bash

      - name: Upgrade APT
        run: apt-get full-upgrade -y
        shell: bash

      - name: Remove APT
        run: apt-get autoremove -y
        shell: bash
      
      - name: Clear APT
        run: apt-get autoclean -y
        shell: bash

      - name: Acquire CMake
        run: wget -O cmake.sh https://github.com/Kitware/CMake/releases/download/v4.3.3/cmake-4.3.3-linux-x86_64.sh
        shell: bash

      - name: Install privileges
        run: chmod +x cmake.sh
        shell: bash

      - name: Install CMake
        run: ./cmake.sh --skip-license --prefix=/usr/local
        shell: bash

      - name: Install Ninja
        run: apt-get install -y ninja-build
        shell: bash

      - name: Install Node
        run: apt-get install -y nodejs npm
        shell: bash

      - name: Install Node dependencies
        run: cd Source/Aura && npm install && cd ../..
        shell: bash
      
      - name: CMake clang debug configuration
        run: cmake -B Build/Debug -S . -G Ninja -D CMAKE_BUILD_TYPE=Debug
        shell: bash

      - name: CMake clang debug symlink
        run: ninja create_symlink -C Build/Debug
        shell: bash

      - name: Ninja clang debug compilation
        run: ninja -C Build/Debug
        shell: bash
      
      - name: CMake clang release configuration
        run: cmake -B Build/Release -S . -G Ninja -D CMAKE_BUILD_TYPE=Release
        shell: bash

      - name: CMake clang release symlink
        run: ninja create_symlink -C Build/Release
        shell: bash

      - name: Ninja clang release compilation
        run: ninja -C Build/Release
        shell: bash